# PANDORA — builds Windows + macOS (double édition Cinéma + Live, v1.3.0+)
#
# Déclenchement :
#   - manuel (workflow_dispatch) depuis l'onglet Actions de GitHub ;
#   - automatique quand une Release est publiée (les artefacts sont alors
#     attachés à la Release).
#
# PyInstaller ne cross-compile pas : le .app/.dmg macOS est produit par le
# runner macos-14 (Apple Silicon). L'app n'est ni signée ni notarisée
# (pas de compte Apple Developer) : au premier lancement, clic droit →
# « Ouvrir » pour passer Gatekeeper.

name: Build PANDORA (Windows + macOS)

on:
  workflow_dispatch:
  release:
    types: [published]

# Nécessaire pour que « gh release upload » (attache des artefacts) fonctionne :
# le GITHUB_TOKEN par défaut est en lecture seule (vu au 1er run : tout le build
# mac a réussi, seule l'attache à la Release a été refusée).
permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: ffmpeg (binaires bundlés)
        shell: pwsh
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -UseBasicParsing
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          Copy-Item ffmpeg_tmp\*\bin\ffmpeg.exe .
          Copy-Item ffmpeg_tmp\*\bin\ffprobe.exe .

      - name: Icône + images wizard
        run: |
          python tools/make_ico.py
          python tools/make_wizard_images.py

      - name: PyInstaller
        run: python -m PyInstaller pandora.spec --noconfirm

      - name: Garde-fous anti-fuite (clés API / données de dev)
        shell: pwsh
        run: |
          foreach ($leak in @(
            "dist\PANDORA\_internal\data\config.json",
            "dist\PANDORA\_internal\studio_images\config.json",
            "dist\PANDORA\_internal\studio_images\prompts.json",
            "dist\PANDORA\_internal\studio_images\refs")) {
            if (Test-Path $leak) { Remove-Item -Recurse -Force $leak; Write-Host "retiré : $leak" }
          }
          $refs = "dist\PANDORA\_internal\assets\style_refs"
          if (Test-Path $refs) { Get-ChildItem $refs -Recurse -File | Remove-Item -Force }

      - name: Installeur Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" pandora_setup.iss

      - name: Artefact (installeur)
        uses: actions/upload-artifact@v4
        with:
          name: PANDORA-Windows-Setup
          path: dist/PANDORA_Setup_*.exe

      - name: Attacher à la Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: gh release upload "${{ github.event.release.tag_name }}" (Get-Item dist/PANDORA_Setup_*.exe).FullName --clobber

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: ffmpeg (binaires statiques macOS)
        run: |
          curl -L -o ffmpeg.zip  "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip"
          curl -L -o ffprobe.zip "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip"
          unzip -o ffmpeg.zip
          unzip -o ffprobe.zip
          chmod +x ffmpeg ffprobe

      - name: Icône .icns
        run: python tools/make_icns.py

      - name: PyInstaller (.app)
        run: python -m PyInstaller pandora.spec --noconfirm

      - name: Garde-fous anti-fuite (clés API / données de dev)
        run: |
          APP="dist/PANDORA.app/Contents/Frameworks"
          for leak in "$APP/data/config.json" "$APP/studio_images/config.json" \
                      "$APP/studio_images/prompts.json" "$APP/studio_images/refs"; do
            [ -e "$leak" ] && rm -rf "$leak" && echo "retiré : $leak"
          done
          REFS="$APP/assets/style_refs"
          [ -d "$REFS" ] && find "$REFS" -type f -delete
          # Selon la version de PyInstaller les datas vivent dans Resources/
          APP2="dist/PANDORA.app/Contents/Resources"
          for leak in "$APP2/data/config.json" "$APP2/studio_images/config.json" \
                      "$APP2/studio_images/prompts.json" "$APP2/studio_images/refs"; do
            [ -e "$leak" ] && rm -rf "$leak" && echo "retiré : $leak"
          done
          REFS2="$APP2/assets/style_refs"
          [ -d "$REFS2" ] && find "$REFS2" -type f -delete
          true

      - name: DMG
        run: |
          VER=$(python -c "from core.version import VERSION; print(VERSION)")
          mkdir -p dmg_root
          cp -R dist/PANDORA.app dmg_root/
          ln -s /Applications dmg_root/Applications
          hdiutil create -volname "PANDORA $VER" -srcfolder dmg_root -ov -format UDZO "dist/PANDORA_$VER.dmg"

      - name: Artefact (DMG)
        uses: actions/upload-artifact@v4
        with:
          name: PANDORA-macOS-DMG
          path: dist/PANDORA_*.dmg

      - name: Attacher à la Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/PANDORA_*.dmg --clobber
